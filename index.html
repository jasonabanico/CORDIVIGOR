<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORDIVIGOR</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            color: #333;
            min-height: 100vh;
        }

        header {
            background: linear-gradient(135deg, #1a3a5c, #2a6496);
            color: #fff;
            padding: 2rem 1rem;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        }

        header h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 1px;
        }

        header p {
            margin-top: 0.5rem;
            font-size: 1rem;
            opacity: 0.85;
        }

        main {
            max-width: 960px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        #breadcrumb {
            margin-bottom: 1.5rem;
            font-size: 0.95rem;
        }

        #breadcrumb a {
            color: #2a6496;
            text-decoration: none;
            cursor: pointer;
        }

        #breadcrumb a:hover {
            text-decoration: underline;
        }

        #breadcrumb span {
            color: #666;
        }

        .view {
            display: none;
        }

        .view.active {
            display: block;
        }

        #categories.active {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.25rem;
        }

        .category-card {
            background: #fff;
            border-radius: 10px;
            padding: 1.75rem;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
            border-left: 5px solid #2a6496;
        }

        .category-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.12);
        }

        .category-card h2 {
            font-size: 1.2rem;
            color: #1a3a5c;
        }

        .category-card .count {
            margin-top: 0.5rem;
            font-size: 0.9rem;
            color: #777;
        }

        #businesses h2 {
            font-size: 1.5rem;
            color: #1a3a5c;
            margin-bottom: 1rem;
        }

        .business-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .business-item {
            background: #fff;
            border-radius: 10px;
            padding: 1.5rem;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            border-left: 5px solid #2a6496;
        }

        .business-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.12);
        }

        .business-item h3 {
            font-size: 1.1rem;
            color: #1a3a5c;
            margin-bottom: 0.4rem;
        }

        .business-item .short-desc {
            font-size: 0.95rem;
            color: #555;
        }

        .business-page {
            background: #fff;
            border-radius: 10px;
            padding: 2rem;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
        }

        .business-page h2 {
            font-size: 1.6rem;
            color: #1a3a5c;
            margin-bottom: 1.25rem;
        }

        .business-page .detail {
            margin-bottom: 1rem;
            line-height: 1.6;
        }

        .business-page .detail-label {
            font-weight: 600;
            color: #1a3a5c;
            display: block;
            margin-bottom: 0.2rem;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .business-page .detail-value {
            font-size: 1rem;
            color: #444;
        }

        .map-embed {
            width: 100%;
            height: 300px;
            border: 0;
            border-radius: 8px;
            margin-top: 0.25rem;
        }

        .business-page a {
            color: #2a6496;
            text-decoration: none;
        }

        .business-page a:hover {
            text-decoration: underline;
        }

        footer {
            text-align: center;
            padding: 2rem 1rem;
            color: #999;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>CORDIVIGOR</h1>
        <p>Business Directory</p>
    </header>

    <main>
        <nav id="breadcrumb"></nav>
        <div id="categories" class="view"></div>
        <div id="businesses" class="view">
            <h2 id="businesses-title"></h2>
            <div class="business-list" id="business-list"></div>
        </div>
        <div id="business-detail" class="view">
            <div class="business-page" id="business-page"></div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 CORDIVIGOR Business Directory</p>
        <p>Sponsored by: <a href="https://highpointmechanical.com.au" target="_blank" rel="noopener">Highpoint Mechanical</a>, your friendly auto repair shop</p>
    </footer>

    <script>
        let allBusinesses = [];

        async function loadCSV() {
            const response = await fetch('data.csv');
            const text = await response.text();
            const lines = text.trim().split('\n');
            const headers = parseCSVLine(lines[0]);

            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                const values = parseCSVLine(lines[i]);
                if (values.length === headers.length) {
                    const entry = {};
                    headers.forEach((h, idx) => entry[h.trim()] = values[idx].trim());
                    allBusinesses.push(entry);
                }
            }

            showCategories();
        }

        function parseCSVLine(line) {
            const result = [];
            let current = '';
            let inQuotes = false;

            for (let i = 0; i < line.length; i++) {
                const ch = line[i];
                if (inQuotes) {
                    if (ch === '"' && line[i + 1] === '"') {
                        current += '"';
                        i++;
                    } else if (ch === '"') {
                        inQuotes = false;
                    } else {
                        current += ch;
                    }
                } else {
                    if (ch === '"') {
                        inQuotes = true;
                    } else if (ch === ',') {
                        result.push(current);
                        current = '';
                    } else {
                        current += ch;
                    }
                }
            }
            result.push(current);
            return result;
        }

        function setActiveView(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function showCategories() {
            setActiveView('categories');
            document.getElementById('breadcrumb').innerHTML = '';

            const categoryMap = {};
            allBusinesses.forEach(b => {
                const cat = b['category'];
                if (!categoryMap[cat]) categoryMap[cat] = 0;
                categoryMap[cat]++;
            });

            const sorted = Object.keys(categoryMap).sort();
            document.getElementById('categories').innerHTML = sorted.map(cat => `
                <div class="category-card" onclick="showBusinesses('${cat.replace(/'/g, "\\'")}')">
                    <h2>${cat}</h2>
                    <div class="count">${categoryMap[cat]} business${categoryMap[cat] > 1 ? 'es' : ''}</div>
                </div>
            `).join('');
        }

        function showBusinesses(category) {
            setActiveView('businesses');

            document.getElementById('breadcrumb').innerHTML =
                `<a onclick="showCategories()">All Categories</a> <span>/ ${category}</span>`;

            document.getElementById('businesses-title').textContent = category;

            const filtered = allBusinesses
                .filter(b => b['category'] === category)
                .sort((a, b) => a['business-name'].localeCompare(b['business-name']));

            document.getElementById('business-list').innerHTML = filtered.map((b, idx) => {
                const originalIdx = allBusinesses.indexOf(b);
                let html = `<div class="business-item" onclick="showBusiness(${originalIdx})">`;
                html += `<h3>${b['business-name']}</h3>`;
                if (b['short-description']) {
                    html += `<div class="short-desc">${b['short-description']}</div>`;
                }
                html += `</div>`;
                return html;
            }).join('');
        }

        function showBusiness(index) {
            const b = allBusinesses[index];
            setActiveView('business-detail');

            document.getElementById('breadcrumb').innerHTML =
                `<a onclick="showCategories()">All Categories</a>` +
                ` <span>/</span> <a onclick="showBusinesses('${b['category'].replace(/'/g, "\\'")}')">${b['category']}</a>` +
                ` <span>/ ${b['business-name']}</span>`;

            let html = `<h2>${b['business-name']}</h2>`;

            if (b['address']) {
                html += `<div class="detail">
                    <span class="detail-label">Address</span>
                    <span class="detail-value">${b['address']}</span>
                </div>`;
            }

            if (b['short-description']) {
                html += `<div class="detail">
                    <span class="detail-value">${b['short-description']}</span>
                </div>`;
            }

            if (b['long-description']) {
                html += `<div class="detail">
                    <span class="detail-label">About</span>
                    <span class="detail-value">${b['long-description']}</span>
                </div>`;
            }

            if (b['phone']) {
                html += `<div class="detail">
                    <span class="detail-label">Phone</span>
                    <span class="detail-value"><a href="tel:${b['phone']}">${b['phone']}</a></span>
                </div>`;
            }

            if (b['website']) {
                html += `<div class="detail">
                    <span class="detail-label">Website</span>
                    <span class="detail-value"><a href="${b['website']}" target="_blank" rel="noopener">${b['website']}</a></span>
                </div>`;
            }

            if (b['address']) {
                const mapQuery = encodeURIComponent(b['business-name'] + ', ' + b['address']);
                html += `<div class="detail">
                    <span class="detail-label">Location</span>
                    <iframe class="map-embed" src="https://www.google.com/maps?q=${mapQuery}&output=embed" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                </div>`;
            }

            document.getElementById('business-page').innerHTML = html;
        }

        loadCSV();
    </script>
</body>
</html>
